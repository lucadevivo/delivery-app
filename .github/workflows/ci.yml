name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # La versione di pnpm è letta dal campo "packageManager" del package.json:
      # specificarla anche qui causerebbe un conflitto "Multiple versions of pnpm".
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @rider/core build
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm --filter @rider/api build
        env:
          # Build statica: nessuna connessione DB richiesta in fase di build.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          BETTER_AUTH_SECRET: ci-placeholder-secret-non-usato-a-runtime
